databases:
  - name: sigints-db
    plan: free
    databaseName: sigints
    user: sigints

services:
  - type: web
    name: sigints-backend
    runtime: node
    repo: https://github.com/heemankv/graveyard
    branch: main
    rootDir: backend
    autoDeploy: true
    plan: free
    buildCommand: npm install --include=dev
    startCommand: npx tsx src/index.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: sigints-db
          property: connectionString
      - key: PORT
        value: "3001"
